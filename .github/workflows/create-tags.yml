# Cria uma tag anotada vX.Y.Z no commit atual (útil antes de disparar o workflow de release por tag).
# Não publica artefactos — para release completo use "Manual Release" ou push de tag + workflow release.yml.
name: Create Version Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão semântica sem prefixo v (ex.: 1.0.0 ou 2.1.3)'
        required: true
        type: string

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validar formato da versão
      run: |
        if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Use o formato X.Y.Z (ex.: 1.0.0)"
          exit 1
        fi

    - name: Verificar se a tag já existe
      run: |
        if git rev-parse "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
          echo "::error::A tag v${{ github.event.inputs.version }} já existe."
          exit 1
        fi

    - name: Configurar Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Criar e enviar tag v${{ github.event.inputs.version }}
      run: |
        git tag -a "v${{ github.event.inputs.version }}" -m "Tag v${{ github.event.inputs.version }}"
        git push origin "v${{ github.event.inputs.version }}"
        echo "Tag v${{ github.event.inputs.version }} criada e enviada."

    - name: Resumo
      run: |
        echo "## Tag criada" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- **v${{ github.event.inputs.version }}** (push via \`github-actions[bot]\`)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Este workflow **não** gera ZIPs nem release. Para artefactos completos use **Manual Release**. Para disparar só o empacotamento com tag criada localmente por si, faça \`git tag\` / \`git push\` no seu ambiente — o workflow **Create Release** corre com o seu actor e publica os ZIPs." >> "$GITHUB_STEP_SUMMARY"
