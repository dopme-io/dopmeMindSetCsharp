# CI: restaura e compila a solução (todos os projetos console e futuras edições na .sln).
# https://docs.github.com/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION: MindSetCSharp.sln

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

    - name: List console projects (informação)
      run: |
        echo "Projetos executáveis na solução:"
        find . -type f -name '*.csproj' \
          ! -path '*/obj/*' ! -path '*/bin/*' \
          -exec grep -l '<OutputType>Exe</OutputType>' {} \; | sed 's|^\./||' | sort || true
